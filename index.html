<!DOCTYPE html>
<html>
    <head>
        <title>1-RM Generator</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <meta name="theme-color" content="#d6d6d6">
        <link rel="stylesheet" href="awesomeStyle.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Faustina:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=BBH+Bogle&display=swap" rel="stylesheet">
        <link rel="manifest" href="manifest.json">
        <script type="module" src="awesomeScript.js" defer></script>
    </head>
    <body>
        <div id="MenuOptions">
            <button data-menu="OneRMGenerator" class="MenuSwitcher MenuOption">1RM Generator</button>
            <button data-menu="PerformanceMetrics" class="MenuSwitcher MenuOption">Performance Metrics</button>
            <button data-menu="VMax" class="MenuSwitcher MenuOption">Vo2 Max</button>
        </div>

        <div id="OneRMGenerator" class="Menu NotRendered">
            <h1 id="1RMTitleText" class="TitleText">1RM Generator</h1>
            <div class="CardContainer">
                <div class="WorkoutInfo">
                    <h2 class="WorkoutLabel">GENDER:</h2>
                    <select id="OneRMGenderSelect" class="WorkoutDropdown">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="GridContainer">
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">AGE:</h2>
                        <input id="OneRMAgeInput" class="WorkoutInput" type="number">
                    </div>
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">WEIGHT:</h2>
                        <input id="OneRMWeightInput" class="WorkoutInput" type="number">
                    </div>
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">LOAD:</h2>
                        <input id="OneRMLoadInput" class="WorkoutInput" type="number">
                    </div>
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">REPS:</h2>
                        <input id="OneRMRepsInput" class="WorkoutInput" type="number">
                    </div>
                </div>
                <div class="WorkoutInfo">
                    <h2 class="WorkoutLabel">EXERCISE:</h2>
                    <select class="WorkoutDropdown" id="OneRMExerciseSelect">
                        <option data-type="Weight">Bench Press</option>
                        <option data-type="Weight">Deadlift</option>
                        <option data-type="Weight">Squat</option>
                        <option data-type="Weight">Overhead Press</option>
                        <option data-type="Weight">Hip Thrust</option>
                        <option data-type="Bodyweight" data-bw="0.70">Push Ups</option>
                        <option data-type="Bodyweight" data-bw="1.0">Chin Ups</option>
                        <option data-type="Bodyweight" data-bw="0.967">Dips</option>
                    </select>
                </div>
            </div>
            <div id="MeasureUnitContainer">
                <h2>Measurement Unit:</h2>
                <select id="OneRMUnitSelect">
                    <option>lbs</option>
                    <option>kgs</option>
                </select>
            </div>
            <button class="CalculateButton" id="OneRMCalculateButton">CALCULATE</button>
            <h3 class="BuildUpText" id="OneRMScoreBuildup"></h3>
            <h1 class="Result" id="OneRMResult"></h1>
            <h3 class="BuildUpText" id="OneRMRankBuildup"></h3>
            <h1 class="Result BlackOutline" id="OneRMRankingResult"></h1>

            <canvas id="GasMeter" class="Visual NotRendered" width="250" height="125"></canvas>

            <div class="GridContainer" style="margin-bottom: 30px;">
                <button class="MenuSwitcher MenuSwap" data-menu="PerformanceMetrics">Performance Metrics</button>
                <button class="MenuSwitcher MenuSwap" data-menu="VMax">Vo2 Max</button>
            </div>
        </div>

        <div id="PerformanceMetrics" class="Menu NotRendered">
            <h1 id="PeformanceMetricsTitle" class="TitleText">Performance Metrics</h1>
            <div class="CardContainer">
                <h2 class="WorkoutLabel">GENDER:</h2>
                <select id="MetricsGenderSelect" class="WorkoutDropdown">
                    <option>Male</option>
                    <option>Female</option>
                </select>

                <hr class="SeparatorLine">

                <h2 class="WorkoutLabel">20m Sprint</h2>
                <input data-shortname="20m" data-name="TwentyMeterSprint" class="WorkoutInput PerformMetricInfo" style="--width: 50%" placeholder="0.0s">
                <h2 class="WorkoutLabel">Vertical Jump</h2>
                <input data-shortname="V Jump" data-inputtype="distance" data-name="VerticalJump" class="WorkoutInput PerformMetricInfo" style="--width: 50%" placeholder="0'0ft">
                <h2 class="WorkoutLabel">Broad Jump</h2>
                <input data-shortname="B Jump" data-inputtype="distance" data-name="BroadJump" class="WorkoutInput PerformMetricInfo" style="--width: 50%" placeholder="0'0ft">
                <h2 class="WorkoutLabel">Medicine Ball Chest Throw</h2>
                <input data-shortname="Med Ball" data-inputtype="distance" data-name="MedicineBallChestThrow" class="WorkoutInput PerformMetricInfo" style="--width: 50%" placeholder="0'0ft">

            </div>
            <button class="CalculateButton" id="PerformMetricsCalculateButton">CALCULATE</button>

            <div id="ResultsContainer" class="CardContainer NotRendered">
                <h1 class="TitleText">RESULTS:</h1>
                <div id="Results">
                    <template id="ExerciseRankTemplate">
                        <hr class="SeparatorLine">
                        <div class="ExerciseResult">
                            <h2 class="ExerciseResultText Name">Med Ball</h2>
                            <h2 class="ExerciseResultText Rank">Intermediate</h2>
                        </div>
                    </template>
                </div>
            </div>

            <canvas id="BarGraph" class="Visual NotRendered" width="300" height="200" style="margin-top: 25px;"></canvas>

            <div class="GridContainer" style="margin-bottom: 30px;">
                <button class="MenuSwitcher MenuSwap" data-menu="OneRMGenerator">1RM Generator</button>
                <button class="MenuSwitcher MenuSwap" data-menu="VMax">Vo2 Max</button>
            </div>
        </div>

        <div id="VMax" class="Menu NotRendered">
            <h1 id="Vo2MaxTitle" class="TitleText">Vo2 Max</h1>
            <div class="CardContainer">
                <div class="GridContainer">
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">GENDER:</h2>
                        <select id="VMaxGenderSelect" class="WorkoutDropdown" style="width: 100%; height: 50px; --font-size: 1.5rem">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">AGE:</h2>
                        <input id="VMaxAgeInput" class="WorkoutInput" type="number">
                    </div>
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">TYPE:</h2>
                        <select id="VMaxExerciseType" class="WorkoutDropdown" style="width: 100%; height: 50px; --font-size: 1.4rem">
                            <option>Distance</option>
                            <option>Timed</option>
                        </select>
                    </div>
                    <div class="WorkoutInfo">
                        <h2 class="WorkoutLabel">SCORE:</h2>
                        <input id="VMaxScoreInput" class="WorkoutInput" placeholder="Minutes">
                    </div>
                </div>
            </div>
            <button class="CalculateButton" id="VMaxCalculateButton">CALCULATE</button>
            <h3 class="BuildUpText" id="VMaxScoreBuildup"></h3>
            <h1 class="Result" id="VMaxResult"></h1>
            <h3 class="BuildUpText" id="VMaxRankBuildup"></h3>
            <h1 class="Result BlackOutline" id="VMaxRankingResult"></h1>

            <div class="GridContainer" style="margin-bottom: 30px;">
                <button class="MenuSwitcher MenuSwap" data-menu="OneRMGenerator">1RM Generator</button>
                <button class="MenuSwitcher MenuSwap" data-menu="PerformanceMetrics">Performance Metrics</button>
            </div>
        </div>

        <img id="Logo" src="Logo.png" alt="Creators Logo">
    </body>
</html>
